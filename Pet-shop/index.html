<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Paws & Claws | Happy Pets</title>
    <style>
        body { background-color: #fffbeb; color: #451a03; font-family: sans-serif; margin: 0; padding: 20px; padding-top: 80px; }
        
        /* 導覽列 */
        .navbar { position: fixed; top: 0; left: 0; right: 0; background: #fff; padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #fde68a; z-index: 100; }
        .brand { font-weight: bold; color: #d97706; font-size: 20px; }
        .cart-status { background: #fef3c7; padding: 8px 15px; border-radius: 20px; font-size: 14px; font-weight: bold; color: #b45309; }
        .cart-count { color: #d97706; margin-left: 5px; }

        .hero { text-align: center; padding: 20px 0; }
        .hero h1 { font-size: 32px; color: #d97706; margin-bottom: 5px; }
        
        .product-card { background: #ffffff; border-radius: 24px; padding: 20px; margin-bottom: 20px; border: 2px solid #fde68a; }
        .specs { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 15px; font-size: 14px; }
        .spec-item { background: #fef8e6; padding: 10px; border-radius: 12px; text-align: center; color: #78350f; font-weight: 500; }
        
        .cta-btn { background: #f59e0b; color: #ffffff; padding: 15px; border-radius: 16px; text-align: center; font-weight: bold; display: block; text-decoration: none; border: none; width: 100%; font-size: 18px; cursor: pointer; box-shadow: 0 4px 0 #b45309; transition: all 0.1s; }
        .cta-btn:active { transform: translateY(2px); box-shadow: 0 2px 0 #b45309; }

        /* 寵物風彈出視窗 */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(69,26,3,0.5); justify-content: center; align-items: center; z-index: 200; }
        .modal-content { background: #ffffff; padding: 30px; border-radius: 24px; text-align: center; max-width: 300px; border: 3px solid #f59e0b; }
        .modal-content h3 { color: #d97706; margin-top: 0; font-size: 22px; }
        .close-btn { background: #fef3c7; color: #b45309; border: none; padding: 10px 20px; border-radius: 12px; margin-top: 15px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

    <div class="navbar">
        <div class="brand">🐾 Paws&Claws</div>
        <div class="cart-status">🛒 My Cart:<span id="cartCount" class="cart-count">0</span></div>
    </div>

    <div class="hero">
        <h1>Pet Paradise</h1>
        <p style="color: #78350f; margin: 0; font-size: 14px;">Only the best for your furry best friends!</p>
    </div>
    
    <div class="product-card">
        <div style="height: 160px; background: #fef3c7; border-radius: 18px; margin-bottom: 15px; display: flex; align-items: center; justify-content: center; color: #b45309; font-size: 30px;">🥎</div>
        <h2>Smart Interactive Squeak Toy</h2>
        <p style="color: #78350f; font-size: 14px; line-height: 1.5;">100% Eco-friendly natural rubber. Keeps your dog engaged and active for hours!</p>
        
        <div class="specs">
            <div class="spec-item">🌿 Eco-Rubber</div>
            <div class="spec-item">🔊 Smart Squeak</div>
        </div>
    </div>

    <button id="buyBtn" class="cta-btn">PAW IT NOW - $19</button>

    <div id="successModal" class="modal">
        <div class="modal-content">
            <h3>🐾 Woof! Added!</h3>
            <p id="modalMessage" style="color: #78350f; font-size: 14px; line-height: 1.5;"></p>
            <button id="closeModal" class="close-btn">Keep Shopping</button>
        </div>
    </div>

    <script>
        let count = 0;
        const buyBtn = document.getElementById('buyBtn');
        const cartCount = document.getElementById('cartCount');
        const modal = document.getElementById('successModal');
        const closeModal = document.getElementById('closeModal');
        const modalMessage = document.getElementById('modalMessage');

        buyBtn.addEventListener('click', () => {
            count++;
            cartCount.innerText = count;
            modalMessage.innerText = `Awesome! 1x "Squeak Toy" added to your paws. Total items: ${count}.`;
            modal.style.display = 'flex';
        });

        closeModal.addEventListener('click', () => { modal.style.display = 'none'; });
    </script>
</body>
</html>
