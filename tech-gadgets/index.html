<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TechPulse | Pro Gear</title>
    <style>
        body { background-color: #0f172a; color: #f1f5f9; font-family: sans-serif; margin: 0; padding: 20px; padding-top: 80px; }
        
        /* 商業功能：固定在頂部的購物車狀態欄 */
        .navbar { position: fixed; top: 0; left: 0; right: 0; background: #1e293b; padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #334155; z-index: 100; }
        .brand { font-weight: bold; color: #38bdf8; font-size: 20px; }
        .cart-status { background: #334155; padding: 8px 15px; border-radius: 20px; font-size: 14px; font-weight: bold; }
        .cart-count { color: #38bdf8; margin-left: 5px; }

        .hero { text-align: center; padding: 20px 0; }
        .hero h1 { font-size: 32px; color: #38bdf8; margin-bottom: 5px; }
        
        .product-card { background: #1e293b; border-radius: 20px; padding: 20px; margin-bottom: 20px; border: 1px solid #334155; }
        .specs { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 15px; font-size: 14px; }
        .spec-item { background: #334155; padding: 10px; border-radius: 8px; text-align: center; color: #cbd5e1; }
        
        .cta-btn { background: #38bdf8; color: #000; padding: 15px; border-radius: 12px; text-align: center; font-weight: bold; display: block; text-decoration: none; border: none; width: 100%; font-size: 16px; cursor: pointer; transition: background 0.2s; }
        .cta-btn:active { background: #0ea5e9; }

        /* 商業功能：彈出式視窗樣式 */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); justify-content: center; align-items: center; z-index: 200; }
        .modal-content { background: #1e293b; padding: 30px; border-radius: 20px; text-align: center; max-width: 300px; border: 1px solid #38bdf8; }
        .modal-content h3 { color: #38bdf8; margin-top: 0; }
        .close-btn { background: #334155; color: #fff; border: none; padding: 10px 20px; border-radius: 8px; margin-top: 15px; cursor: pointer; }
    </style>
</head>
<body>

    <div class="navbar">
        <div class="brand">TechPulse</div>
        <div class="cart-status">🛒 購物車:<span id="cartCount" class="cart-count">0</span></div>
    </div>

    <div class="hero">
        <h1>TechPulse Pro</h1>
        <p style="color: #94a3b8; margin: 0;">Next-gen performance, ultra-sleek design.</p>
    </div>
    
    <div class="product-card">
        <div style="height: 150px; background: #334155; border-radius: 15px; margin-bottom: 15px; display: flex; align-items: center; justify-content: center; color: #64748b;">⚡ [ PRODUCT IMAGE ]</div>
        <h2>Ultra-Fast Powerbank</h2>
        <p style="color: #94a3b8; font-size: 14px; line-height: 1.5;">Keep your devices charged at 2x the speed with our latest smart chip technology.</p>
        
        <div class="specs">
            <div class="spec-item">🔋 20,000mAh</div>
            <div class="spec-item">⚡ 65W Fast Charge</div>
        </div>
    </div>

    <button id="buyBtn" class="cta-btn">BUY NOW - $59</button>

    <div id="successModal" class="modal">
        <div class="modal-content">
            <h3>🎉 成功加入購物車！</h3>
            <p id="modalMessage" style="color: #cbd5e1; font-size: 14px;"></p>
            <button id="closeModal" class="close-btn">繼續購物</button>
        </div>
    </div>

    <script>
        let count = 0;
        const buyBtn = document.getElementById('buyBtn');
        const cartCount = document.getElementById('cartCount');
        const modal = document.getElementById('successModal');
        const closeModal = document.getElementById('closeModal');
        const modalMessage = document.getElementById('modalMessage');

        // 點擊購買按鈕時的邏輯
        buyBtn.addEventListener('click', () => {
            count++;
            cartCount.innerText = count; // 更新頂部購物車數字
            
            // 動態修改彈出視窗的文字
            modalMessage.innerText = `您已成功將 1 件「Ultra-Fast Powerbank」加入購物車。目前購物車內共有 ${count} 件商品。`;
            
            modal.style.display = 'flex'; // 顯示彈出視窗
        });

        // 點擊關閉按鈕時的邏輯
        closeModal.addEventListener('click', () => {
            modal.style.display = 'none'; // 隱藏彈出視窗
        });
    </script>
</body>
</html>
