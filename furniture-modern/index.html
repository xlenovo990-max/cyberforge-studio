<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Studio Nordic | Modern Living</title>
    <style>
        body { background-color: #f8fafc; color: #1e293b; font-family: sans-serif; margin: 0; padding: 20px; padding-top: 80px; }
        
        /* 導覽列 */
        .navbar { position: fixed; top: 0; left: 0; right: 0; background: #ffffff; padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #e2e8f0; z-index: 100; }
        .brand { font-weight: bold; color: #0f172a; font-size: 20px; letter-spacing: 1px; }
        .cart-status { background: #f1f5f9; padding: 8px 15px; border-radius: 20px; font-size: 14px; font-weight: 500; color: #334155; }
        .cart-count { color: #0f172a; font-weight: bold; margin-left: 5px; }

        .hero { text-align: center; padding: 20px 0; }
        .hero h1 { font-size: 30px; color: #0f172a; margin-bottom: 5px; font-weight: 600; }
        
        .product-card { background: #ffffff; border-radius: 16px; padding: 20px; margin-bottom: 20px; border: 1px solid #e2e8f0; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); }
        .specs { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 15px; font-size: 14px; }
        .spec-item { background: #f8fafc; padding: 10px; border-radius: 8px; text-align: center; color: #64748b; border: 1px solid #f1f5f9; }
        
        .cta-btn { background: #0f172a; color: #ffffff; padding: 15px; border-radius: 12px; text-align: center; font-weight: bold; display: block; text-decoration: none; border: none; width: 100%; font-size: 16px; cursor: pointer; transition: background 0.2s; }
        .cta-btn:active { background: #334155; }

        /* 溫潤風彈出視窗 */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(15,23,42,0.6); justify-content: center; align-items: center; z-index: 200; backdrop-filter: blur(4px); }
        .modal-content { background: #ffffff; padding: 30px; border-radius: 20px; text-align: center; max-width: 300px; border: 1px solid #e2e8f0; }
        .modal-content h3 { color: #0f172a; margin-top: 0; font-size: 20px; }
        .close-btn { background: #f1f5f9; color: #334155; border: none; padding: 10px 20px; border-radius: 8px; margin-top: 15px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

    <div class="navbar">
        <div class="brand">STUDIO NORDIC</div>
        <div class="cart-status">🛒 Cart:<span id="cartCount" class="cart-count">0</span></div>
    </div>

    <div class="hero">
        <h1>Minimalist Comfort</h1>
        <p style="color: #64748b; margin: 0; font-size: 14px;">Crafted for modern, mindful spaces.</p>
    </div>
    
    <div class="product-card">
        <div style="height: 180px; background: #f1f5f9; border-radius: 12px; margin-bottom: 15px; display: flex; align-items: center; justify-content: center; color: #94a3b8; font-weight: 500;">🪑 [ OAK CHAIR IMAGE ]</div>
        <h2>The Nordic Lounge Chair</h2>
        <p style="color: #62748b; font-size: 14px; line-height: 1.6; margin-bottom: 15px;">Premium solid oak blended with breathable organic linen cushions for ultimate relaxation.</p>
        
        <div class="specs">
            <div class="spec-item">🪵 Solid Oak Wood</div>
            <div class="spec-item">🌱 Organic Linen</div>
        </div>
    </div>

    <button id="buyBtn" class="cta-btn">ADD TO CART - $249</button>

    <div id="successModal" class="modal">
        <div class="modal-content">
            <h3>✨ Added to Cart</h3>
            <p id="modalMessage" style="color: #64748b; font-size: 14px; line-height: 1.5;"></p>
            <button id="closeModal" class="close-btn">Continue Browsing</button>
        </div>
    </div>

    <script>
        let count = 0;
        const buyBtn = document.getElementById('buyBtn');
        const cartCount = document.getElementById('cartCount');
        const modal = document.getElementById('successModal');
        const closeModal = document.getElementById('closeModal');
        const modalMessage = document.getElementById('modalMessage');

        buyBtn.addEventListener('click', () => {
            count++;
            cartCount.innerText = count;
            modalMessage.innerText = `Success! 1x "Nordic Lounge Chair" has been added. You have ${count} item(s) in your cart.`;
            modal.style.display = 'flex';
        });

        closeModal.addEventListener('click', () => { modal.style.display = 'none'; });
    </script>
</body>
</html>
